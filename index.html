<!doctype html>
<html><head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="style.css">
<title>Truth Transaction</title>
</head>
<body>
<div class="card">

</div>

<button id="scan">Scan Subject</button>
</div>
<script src="app.js"></script>
