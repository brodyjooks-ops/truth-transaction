<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Truth Transaction</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

<h1>Truth Transaction</h1>

<div id="status" class="status">
Ready
</div>

<div class="hint">
Scan Subject
</div>

<div class="panel">
    <div class="label">Subject</div>
    <div id="subject" class="value">---</div>
</div>

<div class="panel">
    <div class="label">Current Position</div>
    <div id="current" class="value">---</div>
</div>

<div class="panel">
    <div class="label">Receiver</div>
    <div id="receiver" class="value">---</div>
</div>

<button id="scanSubject">
Scan Subject
</button>

<button id="scanReceiver" disabled>
Scan Receiver
</button>

<button id="commit" disabled>
Commit
</button>

<div id="receipt" class="receipt hidden">

<h2>Transaction Complete</h2>

<div id="result"></div>

<div id="time"></div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
